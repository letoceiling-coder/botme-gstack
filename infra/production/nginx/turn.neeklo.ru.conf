server {
    listen 80;
    listen [::]:80;
    server_name turn.neeklo.ru;

    # ACME challenge for Let's Encrypt cert renewal of turn.neeklo.ru.
    # coturn TLS (port 5349) uses this cert; nginx never proxies TURN traffic itself.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://agent.neeklo.ru$request_uri;
    }
}
