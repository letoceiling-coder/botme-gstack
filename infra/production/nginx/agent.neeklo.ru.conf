server {
    server_name agent.neeklo.ru;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://127.0.0.1:3110/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3110/socket.io/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /widget.js {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/widget.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    location = /operator-panel.js {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/operator-panel.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    # Hashed assets (embed-XXXXX.js / embed-XXXXX.css) are content-addressed —
    # safe to cache forever.
    location ~ ^/widget/(assets/.+)$ {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/$1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~ ^/operator-panel/(assets/.+)$ {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/$1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /widget/ {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/;
        index index.html;

        add_header Permissions-Policy "camera=*, microphone=*, autoplay=*, fullscreen=*, display-capture=*" always;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /operator-panel/ {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/;
        index index.html;

        add_header Permissions-Policy "camera=*, microphone=*, autoplay=*, fullscreen=*, display-capture=*" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:9000/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    location / {
        root /var/www/agent.neeklo.ru/apps/web/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/agent.neeklo.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/agent.neeklo.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = agent.neeklo.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name agent.neeklo.ru;
    return 404; # managed by Certbot
}
