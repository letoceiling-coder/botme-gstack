# demo.neeklo.ru — isolated demo landing + operator (does NOT modify agent.neeklo.ru)
server {
    listen 443 ssl http2;
    server_name demo.neeklo.ru;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    ssl_certificate /etc/letsencrypt/live/demo.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.neeklo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/demo.neeklo.ru/dist;
    index index.html;

    location = /demo-config.json {
        alias /var/www/demo.neeklo.ru/demo-config.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3110/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3110/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /widget.js {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/widget.js;
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Access-Control-Allow-Origin * always;
    }

    location = /operator-panel.js {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/operator-panel.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    # Hashed assets (embed-XXXXX.js / embed-XXXXX.css) are content-addressed —
    # safe to cache forever. The entry-point HTML always points to the latest
    # hash so stale bundles cannot accidentally win.
    location ~ ^/widget/(assets/.+)$ {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/$1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~ ^/operator-panel/(assets/.+)$ {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/$1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /widget/ {
        alias /var/www/agent.neeklo.ru/apps/widget/dist/;
        add_header Permissions-Policy "camera=*, microphone=*, autoplay=*, fullscreen=*, display-capture=*" always;
        add_header Access-Control-Allow-Origin * always;
        # `index.html` must be re-checked every load so users pick up the
        # latest hashed bundle within minutes of a deploy.
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /operator-panel/ {
        alias /var/www/agent.neeklo.ru/apps/operator-panel/dist/;
        add_header Permissions-Policy "camera=*, microphone=*, autoplay=*, fullscreen=*, display-capture=*" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /operator {
        try_files /operator.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Permissions-Policy "camera=(self \"https://agent.neeklo.ru\"), microphone=(self \"https://agent.neeklo.ru\"), autoplay=*, fullscreen=*" always;
        add_header Cache-Control "public, max-age=300";
    }
}

server {
    listen 80;
    server_name demo.neeklo.ru;
    return 301 https://$host$request_uri;
}
