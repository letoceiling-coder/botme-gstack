# coturn production config for turn.neeklo.ru (212.67.9.173)
# Synced from /etc/turnserver.conf — see infra/scripts/sync-turnserver.sh

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=212.67.9.173
external-ip=212.67.9.173

# realm is REQUIRED for use-auth-secret (REST-style ephemeral credentials).
# Without it coturn rejects every allocation with 401 Unauthorized.
realm=neeklo.ru
server-name=turn.neeklo.ru

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=eLNuaVO0Jr3lBSxYqiHRSCeLL5LQkSzt

stale-nonce=600
no-loopback-peers
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

min-port=49152
max-port=65535
max-bps=3000000
total-quota=200
user-quota=10

cert=/etc/letsencrypt/live/turn.neeklo.ru/fullchain.pem
pkey=/etc/letsencrypt/live/turn.neeklo.ru/privkey.pem

log-file=/var/log/turnserver/turnserver.log
verbose
simple-log
no-stdout-log
